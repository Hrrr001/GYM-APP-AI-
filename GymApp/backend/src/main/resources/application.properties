# 应用配置
spring.application.name=GymApp

# ??????????????????
spring.datasource.url=jdbc:mysql://localhost:3306/gym_app?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=YOUR_DATABASE_PASSWORD
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate ???????????
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.open-in-view=false

# 服务器配置
server.port=8080

# 跨域配置
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# 日志配置
logging.level.com.gym=info

# DeepSeek API配置
deepseek.api.key=YOUR_DEEPSEEK_API_KEY

# Python AI微服务地址
python.ai.base-url=http://localhost:8000

# 数据初始化配置
spring.sql.init.enabled=true
spring.sql.init.mode=always